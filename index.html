          if (!target) return;

            // Check if property is already defined to avoid breaking anything
            var desc = Object.getOwnPropertyDescriptor(target, name);
            if (!desc || desc.configurable) {
              Object.defineProperty(target, name, {
                value: undefined,
                writable: true,
                configurable: true,
                enumerable: false // Safe: non-enumerable prevents enumeration in React props & for/in loops
              });
            }
          } catch (e) {

            try {
              target[name] = undefined;
            } catch (innerErr) {}
          }
        }

        // Apply on window and globalThis (but NEVER Object.prototype to avoid polluting React properties/other objects)
        secureDataProperty(window, 'tronlinkParams');

            'chrome-extension',

        var originalConsoleWarn = console.warn;

          var silenceKeywords = [

      window.addEventListener('error', function(event) {

        var reason = event.reason;
